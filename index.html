<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST EEE Pathway Analyzer</title>
    <style>
        :root {
            --bg: #f6f4ee;
            --surface: rgba(255, 255, 255, 0.82);
            --surface-border: rgba(41, 55, 66, 0.1);
            --text: #22313a;
            --muted: #5d6d75;
            --accent: #0d6b6f;
            --accent-soft: #dff3f1;
            --shadow: 0 18px 45px rgba(33, 49, 58, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 32px 20px 56px;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(13, 107, 111, 0.12), transparent 32%),
                radial-gradient(circle at bottom right, rgba(197, 154, 92, 0.12), transparent 28%),
                linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
        }

        .hero {
            margin-bottom: 28px;
        }

        .eyebrow {
            margin: 0 0 10px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.25rem);
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        .intro {
            max-width: 720px;
            margin: 14px 0 0;
            font-size: 1rem;
            line-height: 1.7;
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 22px;
        }

        .grid > div {
            padding: 24px;
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            background: var(--surface);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
        }

        h3 {
            margin: 0 0 16px;
            font-size: 1.25rem;
            line-height: 1.3;
        }

        p {
            margin: 0 0 12px;
        }

        p:last-child {
            margin-bottom: 0;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            background: var(--accent-soft);
            transition: transform 160ms ease, background-color 160ms ease, color 160ms ease;
        }

        a:hover,
        a:focus-visible {
            transform: translateY(-1px);
            color: white;
            background: var(--accent);
            outline: none;
        }

        @media (max-width: 640px) {
            body {
                padding: 24px 16px 40px;
            }

            .hero {
                margin-bottom: 22px;
            }

            .grid {
                gap: 16px;
            }

            .grid > div {
                padding: 20px;
                border-radius: 16px;
            }

            a {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <main class="page">
        <header class="hero">
            <p class="eyebrow">GST EEE Pathway Analyzer</p>
            <h1>Research Dashboards</h1>
            <p class="intro">A clean starting point to compare Claude, Gemini, and ChatGPT research outputs for the GST EEE pathway.</p>
        </header>

        <section class="grid">
            <div>
                <h3>Claude Research</h3>
                <p><a href="/claude/gst_eee_dashboard.html">See Dashboard</a></p>
            </div>
            <div>
                <h3>Gemini Research</h3>
                <p><a href="/gemini/index.html">See Dashboard 1</a></p>
                <p><a href="/gemini/gst_eee_dashboard.html">See Dashboard 2</a></p>
                <p><a href="/gemini/gst_eee_university_profiles.json">See JSON Data</a></p>
            </div>
            <div>
                <h3>ChatGPT Research</h3>
                <p><a href="/chatgpt/Interactive HTML Dashboard.html">See Dashboard</a></p>
                <p><a href="/chatgpt/University Profiles.json">See JSON Data</a></p>
            </div>
        </section>
    </main>

</body>

</html>
